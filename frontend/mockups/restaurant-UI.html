<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacroFinder — Restaurant Page Concept</title>
  <style>
    :root {
      --bg: #f7f6f1;
      --surface: rgba(255,255,255,0.92);
      --surface-2: #f0ede4;
      --text: #1f1f1a;
      --muted: #6d6a61;
      --line: #e6e0d5;
      --accent: #3f7b58;
      --accent-2: #111827;
      --accent-soft: #edf5ef;
      --shadow: 0 18px 42px rgba(22, 22, 18, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1240px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fbfaf7 0%, #f5f2eb 100%);
      color: var(--text);
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button, input { font: inherit; }

    .container {
      width: min(calc(100% - 20px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(251,250,247,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(31,31,26,0.06);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: auto minmax(220px, 560px) auto;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.02em;
      min-width: 0;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, #52a56f, #7fc591);
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .search-shell {
      background: rgba(255,255,255,0.92);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(22, 22, 18, 0.06);
      min-width: 0;
    }

    .search-shell input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      color: var(--text);
      font-size: 0.98rem;
    }

    .search-shell span { color: var(--muted); }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      min-width: 0;
    }

    .pill-btn,
    .ghost-btn,
    .icon-btn,
    .sort-btn,
    .mini-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
    }

    .pill-btn,
    .ghost-btn,
    .sort-btn {
      padding: 11px 16px;
      font-weight: 700;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 1rem;
    }

    .mini-btn {
      padding: 8px 11px;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .page-shell {
      padding: 18px 0 36px;
    }

    .page-actions {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      min-height: 360px;
      background-image: url('https://images.unsplash.com/photo-1552566626-52f8b828add9?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      isolation: isolate;
      display: flex;
      align-items: flex-end;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.68));
      z-index: -1;
    }

    .hero-top {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 2;
    }

    .chip-row,
    .hero-actions,
    .filter-row,
    .sort-row,
    .metric-row,
    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge,
    .chip,
    .metric-pill,
    .tag {
      border-radius: 999px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .badge {
      padding: 8px 11px;
      font-size: 0.76rem;
      background: rgba(255,255,255,0.94);
      color: var(--text);
      box-shadow: 0 10px 22px rgba(0,0,0,0.12);
    }

    .hero-copy {
      width: 100%;
      padding: 22px;
      color: white;
    }

    .logo-bubble {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .hero-title-row {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(2rem, 4.6vw, 3.25rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      max-width: 10ch;
    }

    .hero-sub {
      margin-top: 10px;
      color: rgba(255,255,255,0.88);
      font-size: 0.96rem;
      max-width: 62ch;
      line-height: 1.45;
    }

    .hero-side {
      display: grid;
      gap: 10px;
      min-width: 180px;
    }

    .hero-price {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 14px 16px;
      text-align: right;
    }

    .hero-price small {
      display: block;
      color: rgba(255,255,255,0.8);
      font-size: 0.78rem;
      margin-bottom: 4px;
    }

    .hero-price strong {
      font-size: 1.22rem;
      letter-spacing: -0.03em;
    }

    .hero-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .metric-pill,
    .tag,
    .chip {
      padding: 9px 12px;
      font-size: 0.82rem;
      background: var(--surface-2);
      color: #2d2b26;
