<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MacroFinder — Profile</title>

  <style>
    :root {
      --bg: #f7f7f4;
      --surface: #ffffff;
      --surface-2: #f0efe9;
      --text: #1d1d1b;
      --muted: #6d6a63;
      --line: #e6e1d8;
      --accent: #3d7a57;
      --accent-soft: #edf5ef;
      --danger: #a14d4d;
      --danger-soft: #f8ecec;
      --shadow: 0 14px 40px rgba(20,21,18,0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #fbfaf7 0%, #f5f3ee 100%);
      color: var(--text);
    }

    .container {
      width: min(calc(100% - 32px), 900px);
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(251,250,247,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(29,29,27,0.06);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg,#4fa36e,#7cc08e);
      color: white;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
    }

    .top-actions {
      display: flex;
      gap: 10px;
    }
    a {
       text-decoration: none;
       color: inherit;
    }

    .pill-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .page {
      padding: 30px 0 80px;
    }

    .header h1 {
      margin: 0 0 24px;
      font-size: clamp(2rem,5vw,3rem);
      letter-spacing: -0.05em;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 16px;
      margin-bottom: 30px;
    }

    .quick-card {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: 0.15s ease;
    }

    .quick-card:hover {
      transform: translateY(-3px);
    }

    .quick-icon {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    .quick-title {
      font-weight: 800;
    }

    .menu {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .menu-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 18px;
      border-top: 1px solid rgba(29,29,27,0.06);
      cursor: pointer;
    }

    .menu-row:first-child {
      border-top: none;
    }

    .menu-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .menu-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--surface-2);
      display: grid;
      place-items: center;
    }

    .menu-title {
      font-weight: 700;
    }

    .menu-arrow {
      color: var(--muted);
    }

    .logout {
      color: var(--danger);
    }

    .logout .menu-icon {
      background: var(--danger-soft);
      color: var(--danger);
    }

    @media (max-width: 600px) {
      .quick-actions {
        gap: 10px;
      }
    }

  </style>
</head>

<body>

<header class="topbar">
  <div class="container topbar-inner">
    <div class="brand">
      <div class="brand-mark">M</div>
      <span>MacroFinder</span>
    </div>

    <div class="top-actions">
      <a href="main_page.html" class="pill-btn">Home</a>
      <a href="profile.html" class="pill-btn">Profile</a>
    </div>
  </div>
</header>

<main class="container page">

  <section class="header">
    <h1>Jaskeerat Rai</h1>
  </section>

  <section class="quick-actions">
    <div class="quick-card">
      <div class="quick-icon">♡</div>
      <div class="quick-title">Saved</div>
    </div>

    <div class="quick-card">
      <div class="quick-icon">🏬</div>
      <div class="quick-title">Restaurants</div>
    </div>

    <div class="quick-card">
      <div class="quick-icon">👁</div>
      <div class="quick-title">Recent</div>
    </div>
  </section>

  <section class="menu">

    <div class="menu-row">
      <div class="menu-left">
        <div class="menu-icon">❓</div>
        <div class="menu-title">Help</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <div class="menu-row">
      <div class="menu-left">
        <div class="menu-icon">⚙</div>
        <div class="menu-title">Settings</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <div class="menu-row">
      <div class="menu-left">
        <div class="menu-icon">🔔</div>
        <div class="menu-title">Notifications</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <div class="menu-row">
      <div class="menu-left">
        <div class="menu-icon">👤</div>
        <div class="menu-title">Manage Account</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <div class="menu-row">
      <div class="menu-left">
        <div class="menu-icon">ℹ</div>
        <div class="menu-title">About</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

    <div class="menu-row logout">
      <div class="menu-left">
        <div class="menu-icon">↪</div>
        <div class="menu-title">Logout</div>
      </div>
      <div class="menu-arrow">›</div>
    </div>

  </section>

</main>

</body>
</html>
