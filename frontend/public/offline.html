<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Macro Finder | Offline</title>
    <meta name="theme-color" content="#2f7a59" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #fbf7ef 0%, #f7f0e5 100%);
        color: #1d241d;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(560px, 100%);
        padding: 24px;
        border-radius: 24px;
        border: 1px solid #ddd1bd;
        background: rgba(255, 251, 245, 0.95);
        box-shadow: 0 18px 50px rgba(53, 55, 44, 0.1);
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.6rem, 4.2vw, 2rem);
        line-height: 1.1;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: #667164;
      }
      .button {
        margin-top: 18px;
        min-height: 46px;
        border-radius: 999px;
        padding: 0 18px;
        border: 1px solid #2f7a59;
        background: #2f7a59;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>
        Macro Finder cannot reach the network right now. Reconnect and try again.
        Previously loaded static screens will still open.
      </p>
      <button class="button" type="button" onclick="window.location.reload()">
        Retry connection
      </button>
    </main>
  </body>
</html>
